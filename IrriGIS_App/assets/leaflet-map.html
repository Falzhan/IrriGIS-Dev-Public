<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Leaflet Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    #map { height: 100%; width: 100%; }
    .leaflet-popup-content-wrapper { border-radius: 8px; }
    .leaflet-popup-content { margin: 10px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; }
    .custom-marker { display: flex; align-items: center; justify-content: center; }
    .flag-marker { width: 38px; height: 44px; position: relative; }
    .teardrop-marker { width: 38px; height: 44px; position: relative; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Initialize map
    const map = L.map('map').setView([6.5, 125.0], 10);
    
    // OSM Tile Layer
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      minZoom: 10,
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // Store markers and polylines for updates
    let markers = [];
    let polylines = [];
    let canalPolylines = [];

    // Create custom flag marker icon (for tickets)
    function createFlagIcon(color, isSelected) {
      const size = isSelected ? 45 : 38;
      return L.divIcon({
        className: 'custom-marker',
        html: `
          <svg width="${size}" height="${size * 1.14}" viewBox="0 0 ${size} ${Math.ceil(size * 1.14)}">
            <g opacity="${isSelected ? 1 : 0.9}">
              <path d="M 2.2 2 L 33.8 2 Q 30.8 10.5 33.8 19 L 2.2 19 Z" fill="${color}" />
              <path d="M 1.1 2 L 1.1 ${size * 0.82}" stroke="#6B7280" stroke-width="2.2" stroke-linecap="round" />
            </g>
          </svg>
        `,
        iconSize: [size, size * 1.14],
        iconAnchor: [size / 2, size * 1.14]
      });
    }

    // Create custom teardrop marker icon (for reports)
    function createTeardropIcon(color, category) {
      return L.divIcon({
        className: 'custom-marker',
        html: `
          <svg width="38" height="44" viewBox="0 0 38 44">
            <path d="M 19 43 Q 5 32 5 19 A 14 14 0 1 1 33 19 Q 33 32 19 43 Z" fill="${color}" />
            <circle cx="19" cy="15" r="5" fill="white" />
          </svg>
        `,
        iconSize: [38, 44],
        iconAnchor: [19, 44]
      });
    }

    // Update map with data from React Native
    function updateMap(data) {
      // Clear existing layers
      markers.forEach(m => map.removeLayer(m));
      polylines.forEach(p => map.removeLayer(p));
      canalPolylines.forEach(p => map.removeLayer(p));
      markers = [];
      polylines = [];
      canalPolylines = [];

      if (!data) return;

      // Add canal polylines
      if (data.canals && Array.isArray(data.canals)) {
        data.canals.forEach((canal, idx) => {
          if (canal.geometry && canal.geometry.coordinates) {
            const coords = canal.geometry.coordinates;
            let latlngs = [];
            
            if (canal.geometry.type === 'LineString') {
              latlngs = coords.map(c => [c[1], c[0]]);
            } else if (canal.geometry.type === 'MultiLineString') {
              coords.forEach(line => {
                latlngs = latlngs.concat(line.map(c => [c[1], c[0]]));
              });
            }

            if (latlngs.length > 1) {
              const color = getCanalColor(canal.properties?.feature_type || 'canal');
              const polyline = L.polyline(latlngs, {
                color: color,
                weight: getCanalWeight(canal.properties?.feature_type || 'canal'),
                opacity: 0.85
              }).addTo(map);
              canalPolylines.push(polyline);
            }
          }
        });
      }

      // Add report markers
      if (data.reports && Array.isArray(data.reports)) {
        data.reports.forEach((report, idx) => {
          if (!report.properties || report.properties.is_valid === false) return;
          if (!report.geometry || !report.geometry.coordinates) return;

          const props = report.properties;
          const coords = report.geometry.coordinates;
          const latLng = [coords[1], coords[0]];

          const hasTicket = !!props.ticket_id;
          const color = hasTicket ? getTicketColor(props.status || 'pending') : getCategoryColor(props.category || 'other');
          const icon = hasTicket ? createFlagIcon(color, false) : createTeardropIcon(color, props.category);

          const marker = L.marker(latLng, { icon }).addTo(map);
          
          const popupContent = `
            <div style="min-width: 140px;">
              <strong>${hasTicket ? 'Ticket' : 'Report'}: ${props.location_name || '#' + (props.id || '').slice(0, 8)}</strong><br/>
              <span>Status: ${hasTicket ? (props.status || 'pending') : 'No Ticket'}</span><br/>
              <span>Category: ${(props.category || 'other').toUpperCase()}</span>
            </div>
          `;
          
          marker.bindPopup(popupContent);
          
          marker.on('click', () => {
            window.ReactNativeWebView.postMessage(JSON.stringify({
              type: 'markerClick',
              reportId: String(props.id || report.id),
              lat: coords[1],
              lng: coords[0]
            }));
          });

          markers.push(marker);
        });
      }

      // Auto-fit bounds if we have data
      if (markers.length > 0 || canalPolylines.length > 0) {
        const group = L.featureGroup([...markers, ...canalPolylines]);
        map.fitBounds(group.getBounds().pad(0.1));
      }
    }

    // Helper functions for colors
    function getCanalColor(type) {
      const colors = {
        main_canal: '#2563EB',
        lateral: '#7C3AED',
        farm_ditch: '#06B6D4',
        pipeline: '#F59E0B',
        canal: '#74A5A8'
      };
      return colors[type] || '#6B7280';
    }

    function getCanalWeight(type) {
      const weights = {
        main_canal: 6,
        lateral: 5,
        farm_ditch: 2,
        pipeline: 4,
        canal: 4
      };
      return weights[type] || 4;
    }

    function getTicketColor(status) {
      const colors = {
        pending: '#F59E0B',
        in_progress: '#EF4444',
        closed: '#10B981',
        rejected: '#EF4444'
      };
      return colors[status] || '#F59E0B';
    }

    function getCategoryColor(category) {
      const colors = {
        inspection: '#3B82F6',
        maintenance: '#F59E0B',
        cleaning: '#06B6D4',
        issue: '#EF4444',
        other: '#6B7280'
      };
      return colors[category] || '#6B7280';
    }

    // Listen for messages from React Native
    window.addEventListener('message', function(event) {
      try {
        const data = JSON.parse(event.data);
        if (data.type === 'updateMap') {
          updateMap(data.payload);
        }
      } catch (e) {
        console.error('Error parsing message:', e);
      }
    });

    // Notify React Native that map is ready
    window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'mapReady' }));
  </script>
</body>
</html>
